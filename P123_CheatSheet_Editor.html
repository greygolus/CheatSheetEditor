<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheat Sheet Editor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
/* ===== EDITOR CHROME ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;overflow-x:hidden;}
.app{display:flex;height:100vh;}

/* Sidebar */
.sidebar{width:280px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.sidebar h1{font-size:14px;padding:12px 14px;border-bottom:1px solid #334155;color:#f8fafc;display:flex;align-items:center;gap:6px;}
.sidebar h1 span{font-size:18px;}
.tool-group{padding:10px 12px;border-bottom:1px solid #334155;}
.tool-group label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#94a3b8;display:block;margin-bottom:6px;font-weight:600;}
.tool-group button{display:block;width:100%;padding:7px 10px;margin-bottom:4px;border:1px solid #475569;background:#334155;color:#e2e8f0;border-radius:4px;cursor:pointer;font-size:12px;text-align:left;transition:all .15s;}
.tool-group button:hover{background:#475569;border-color:#64748b;}
.tool-group button.primary{background:#2563eb;border-color:#3b82f6;color:#fff;}
.tool-group button.primary:hover{background:#1d4ed8;}
.tool-group button.danger{background:#7f1d1d;border-color:#991b1b;color:#fca5a5;}
.tool-group button.danger:hover{background:#991b1b;}
.tool-group input[type=range]{width:100%;accent-color:#2563eb;}
.tool-group input[type=color]{width:40px;height:24px;border:1px solid #475569;border-radius:3px;cursor:pointer;background:none;}
.tool-group select{width:100%;padding:5px;background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:3px;font-size:11px;}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.slider-row span{font-size:11px;color:#cbd5e1;min-width:32px;text-align:right;}
.section-list{flex:1;overflow-y:auto;padding:6px;}
.section-item{padding:6px 8px;margin-bottom:3px;border-radius:4px;border:1px solid #475569;display:flex;align-items:center;gap:6px;cursor:grab;font-size:11px;background:#1e293b;transition:all .15s;}
.section-item:hover{background:#334155;}
.section-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.section-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.section-item .btns{display:flex;gap:2px;}
.section-item .btns button{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:13px;padding:1px 3px;border-radius:2px;}
.section-item .btns button:hover{color:#f8fafc;background:#475569;}

/* Main area */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{padding:6px 14px;background:#1e293b;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar button{padding:5px 12px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.btn-pdf{background:#2563eb;color:#fff;}.btn-pdf:hover{background:#1d4ed8;}
.btn-fit{background:#059669;color:#fff;}.btn-fit:hover{background:#047857;}
.btn-math{background:#d97706;color:#fff;}.btn-math:hover{background:#b45309;}
.topbar .info{font-size:11px;color:#94a3b8;margin-left:auto;}
.topbar .fit-indicator{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600;}
.fit-ok{background:#065f46;color:#6ee7b7;}
.fit-over{background:#7f1d1d;color:#fca5a5;}

/* Preview area */
.preview-wrap{flex:1;overflow:auto;display:flex;justify-content:center;padding:20px;background:#0f172a;}
.page-shadow{box-shadow:0 4px 24px rgba(0,0,0,0.5);background:#fff;}

/* ===== THE ACTUAL SHEET ===== */
.page{width:8.5in;height:11in;padding:0.12in;overflow:hidden;position:relative;color:#111;font-family:'Arial Narrow','Liberation Sans Narrow',sans-serif;}
.page .hdr{text-align:center;font-weight:bold;border-bottom:1.5pt solid #222;padding-bottom:1pt;margin-bottom:1.5pt;}
.page .cols{column-count:3;column-gap:4.5pt;column-rule:0.4pt solid #bbb;height:calc(100% - 1.2em);}
.page .s{break-inside:avoid;margin-bottom:2pt;padding:1pt 2pt;border-radius:1.5pt;position:relative;}
.page .s h2{font-weight:bold;margin-bottom:0.5pt;padding:0.3pt 2pt;border-radius:1pt;color:#fff;text-transform:uppercase;letter-spacing:0.3pt;}
.page .s .content{min-height:4px;}
.page .s .content:focus{outline:1.5px dashed #2563eb;background:#eff6ff;border-radius:2px;}
.page .fb{border:0.6pt solid #888;background:#fafaf5;padding:0.8pt 2pt;margin:1pt 0;border-radius:1pt;}
.page .w{color:#dc2626;font-weight:bold;}
.page .n{color:#666;font-style:italic;}
.page .tip{background:#fef3c7;border-left:1.5pt solid #f59e0b;padding:0.5pt 2pt;margin:1pt 0;border-radius:0 1pt 1pt 0;}
.page table{width:100%;border-collapse:collapse;margin:1pt 0;}
.page td,.page th{border:0.4pt solid #aaa;padding:0.3pt 1.5pt;}
.page th{background:#e5e7eb;font-weight:bold;text-align:center;}
.page img{max-width:100%;height:auto;margin:1pt 0;border-radius:2pt;}
.page svg{display:block;margin:1pt auto;}

/* Section hover controls */
.s .section-controls{display:none;position:absolute;top:-1px;right:2px;gap:2px;z-index:10;}
.s:hover .section-controls{display:flex;}
.s .section-controls button{background:#334155;color:#e2e8f0;border:1px solid #475569;padding:1px 4px;border-radius:2px;cursor:pointer;font-size:9px;line-height:1.2;}
.s .section-controls button:hover{background:#475569;}

/* Image in section */
.section-img{position:relative;display:inline-block;}
.section-img .remove-img{position:absolute;top:0;right:0;background:rgba(220,38,38,0.9);color:#fff;border:none;border-radius:50%;width:12px;height:12px;font-size:8px;cursor:pointer;display:none;line-height:12px;text-align:center;}
.section-img:hover .remove-img{display:block;}

/* Print */
@media print {
  body{background:#fff!important;margin:0;padding:0;}
  .sidebar,.topbar{display:none!important;}
  .app{display:block!important;}
  .main{display:block!important;overflow:visible!important;}
  .preview-wrap{display:block!important;padding:0!important;overflow:visible!important;background:#fff!important;}
  .page-shadow{box-shadow:none!important;}
  .page{width:100%!important;height:auto!important;padding:0.12in!important;}
  .section-controls{display:none!important;}
  .remove-img{display:none!important;}
}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal{background:#1e293b;border:1px solid #475569;border-radius:8px;padding:20px;width:350px;max-width:90vw;}
.modal h3{font-size:14px;margin-bottom:12px;color:#f8fafc;}
.modal input,.modal select,.modal textarea{width:100%;padding:6px 8px;background:#0f172a;border:1px solid #475569;border-radius:4px;color:#e2e8f0;font-size:12px;margin-bottom:8px;}
.modal textarea{height:120px;font-family:'Arial Narrow',sans-serif;font-size:11px;}
.modal .modal-btns{display:flex;gap:6px;justify-content:flex-end;margin-top:8px;}
.modal .modal-btns button{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;}
</style>
</head>
<body>
<div class="app">

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <h1><span>📐</span> Cheat Sheet Editor</h1>

  <div class="tool-group">
    <label>Page Settings</label>
    <div class="slider-row">
      <span>Font</span>
      <input type="range" id="fontSlider" min="4" max="8" step="0.1" value="5.6">
      <span id="fontVal">5.6pt</span>
    </div>
    <div class="slider-row">
      <span>Line</span>
      <input type="range" id="lineSlider" min="0.9" max="1.4" step="0.02" value="1.06">
      <span id="lineVal">1.06</span>
    </div>
    <div class="slider-row">
      <span>Cols</span>
      <select id="colSelect">
        <option value="2">2 columns</option>
        <option value="3" selected>3 columns</option>
        <option value="4">4 columns</option>
      </select>
    </div>
    <div class="slider-row">
      <span>Gap</span>
      <input type="range" id="gapSlider" min="2" max="10" step="0.5" value="4.5">
      <span id="gapVal">4.5pt</span>
    </div>
    <button class="primary" onclick="autoFitPage()">⚡ Auto-fit to Page</button>
  </div>

  <div class="tool-group">
    <label>Sections</label>
    <button class="primary" onclick="showAddSectionModal()">+ Add Section</button>
    <button onclick="showAddImageModal()">🖼️ Add Image to Section</button>
  </div>

  <div class="tool-group">
    <label>Section Order <span style="font-size:9px;color:#64748b;">(drag to reorder)</span></label>
    <div id="sectionList" class="section-list"></div>
  </div>

  <div class="tool-group">
    <label>Import / Export</label>
    <button onclick="exportJSON()">💾 Save Project (JSON)</button>
    <button onclick="document.getElementById('importFile').click()">📂 Load Project (JSON)</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="topbar">
    <button class="btn-pdf" onclick="window.print()">🖨️ Print / Save PDF</button>
    <button class="btn-fit" onclick="autoFitPage()">⚡ Auto-fit</button>
    <button class="btn-math" onclick="reRenderMath()">🔄 Re-render Math</button>
    <div class="info">Click any section text to edit. Use $...$ for math.</div>
    <div id="fitIndicator" class="fit-indicator fit-ok">✓ Fits on 1 page</div>
  </div>

  <div class="preview-wrap">
    <div class="page-shadow">
      <div class="page" id="page">
        <div class="hdr" id="pageHeader" contenteditable="true" style="font-size:7pt;">P123 Exam 2 — Waves → Thin Lenses &nbsp; Name: ___________</div>
        <div class="cols" id="columnsContainer"></div>
      </div>
    </div>
  </div>
</div>

</div>

<!-- Add Section Modal -->
<div id="addSectionModal" class="modal-overlay" style="display:none;">
<div class="modal">
  <h3>Add New Section</h3>
  <input type="text" id="newSectionTitle" placeholder="Section title (e.g. Thin Lenses)">
  <label style="font-size:10px;color:#94a3b8;display:block;margin-bottom:4px;">Section Color</label>
  <select id="newSectionColor">
    <option value="#64748b">Gray (Relativity)</option>
    <option value="#2563eb">Blue (SHM)</option>
    <option value="#059669">Green (Waves)</option>
    <option value="#d97706">Orange (Sound)</option>
    <option value="#dc2626">Red (EM)</option>
    <option value="#7c3aed">Purple (Polarization)</option>
    <option value="#0e7490">Teal (Optics)</option>
    <option value="#db2777">Pink (Lenses)</option>
    <option value="#374151">Dark (Constants)</option>
    <option value="#b45309">Amber (Tips)</option>
  </select>
  <label style="font-size:10px;color:#94a3b8;display:block;margin:4px 0;">Content (HTML — use $...$ for math, &lt;b&gt; for bold, &lt;br&gt; for line break)</label>
  <textarea id="newSectionContent" placeholder="Enter content... Use $formula$ for math."></textarea>
  <div class="modal-btns">
    <button style="background:#475569;color:#e2e8f0;" onclick="closeModal('addSectionModal')">Cancel</button>
    <button style="background:#2563eb;color:#fff;" onclick="addSection()">Add Section</button>
  </div>
</div>
</div>

<!-- Add Image Modal -->
<div id="addImageModal" class="modal-overlay" style="display:none;">
<div class="modal">
  <h3>Add Image to Section</h3>
  <label style="font-size:10px;color:#94a3b8;display:block;margin-bottom:4px;">Select Section</label>
  <select id="imageTargetSection"></select>
  <label style="font-size:10px;color:#94a3b8;display:block;margin:4px 0;">Upload Image</label>
  <input type="file" id="imageFileInput" accept="image/*">
  <div class="slider-row" style="margin-top:6px;">
    <span style="color:#94a3b8;font-size:10px;">Max Width</span>
    <input type="range" id="imageWidth" min="30" max="100" value="100">
    <span id="imageWidthVal" style="color:#94a3b8;font-size:10px;">100%</span>
  </div>
  <div class="modal-btns">
    <button style="background:#475569;color:#e2e8f0;" onclick="closeModal('addImageModal')">Cancel</button>
    <button style="background:#2563eb;color:#fff;" onclick="addImageToSection()">Add Image</button>
  </div>
</div>
</div>

<script>
// ===== STATE =====
let sections = [];
let sectionIdCounter = 0;
let draggedItem = null;

// ===== INITIALIZE WITH CURRENT SHEET CONTENT =====
function initSections() {
  const initialSections = [
    {title:"Special Relativity", color:"#64748b", content:`<p>$\\gamma=1/\\sqrt{1-v^2/c^2}$, $\\beta=v/c$ &nbsp;|&nbsp; $E^2=m^2c^4+p^2c^2$</p><p><b>Lorentz:</b> $x'=\\gamma(x-vt)$, $t'=\\gamma(t-vx/c^2)$</p><p><b>Vel add:</b> $u_x'=\\frac{u_x-v}{1-u_xv/c^2}$, $u_{y,z}'=\\frac{u_{y,z}}{\\gamma(1-u_xv/c^2)}$</p><p><b>4-vec:</b> $x_\\mu=(ct,x,y,z)$, $P_\\mu=(E/c,\\vec p)$, $M_\\mu=\\gamma(c,\\vec v)$</p><p>$a\\cdot b=-a_0b_0+a_1b_1+a_2b_2+a_3b_3$</p><p><b>Light Doppler:</b> $\\nu_{obs}=\\nu_s\\sqrt{\\frac{c\\pm v}{c\\mp v}}$ <span class="n">+top = approaching (blueshift), bottom = receding. λ shifts inversely to ν.</span></p>`},
    {title:"SHM Essentials", color:"#2563eb", content:`<p>$\\ddot x+(k/m)x=0$, $\\omega^2=k/m$, $x=A\\cos(\\omega t+\\phi)$, $v=-A\\omega\\sin(\\omega t+\\phi)$</p><p>$T=2\\pi/\\omega$, $f=1/T$ | <b>Pendulum:</b> $T=2\\pi\\sqrt{\\ell/g}$ <span class="n">— period indep. of mass & amplitude</span></p><p><b>Energy:</b> $KE=\\frac12 m\\omega^2A^2\\sin^2(\\omega t+\\phi)$, $PE=\\frac12 kx^2$, $E_{tot}=\\frac12 kA^2$</p><p>$KE/PE=\\tan^2(\\omega t+\\phi)$ <span class="n">— use for ratio at specific phase/time</span></p><p><b>Add mass at equil:</b> momentum: $m_1v_1=m_2v_2$. Then $A_2=v_2\\sqrt{m_2/k}$, $T_2=2\\pi\\sqrt{m_2/k}$</p><p><b>Damped:</b> $x=Ae^{-bt/2m}\\cos(\\omega't+\\phi)$, $\\omega'=\\sqrt{\\omega_0^2-(b/2m)^2}$. $E\\propto A^2$: 5% A drop → 9.75% E loss.</p><p><b>Driven:</b> $A=\\frac{F_0}{\\sqrt{m^2(\\omega^2-\\omega_0^2)^2+b^2\\omega^2}}$, $\\tan\\delta=\\frac{b\\omega}{m(\\omega_0^2-\\omega^2)}$ <span class="n">— resonance near ω≈ω₀</span></p><p><b>Custom potential:</b> Taylor expand $V(x)$ about equil $x_0$: $\\omega=\\sqrt{V''(x_0)/m}$. Find equil where V'=0, confirm V''>0.</p>`},
    {title:"Traveling Waves", color:"#059669", content:`<div class="fb">$y=A\\sin(kx-\\omega t+\\phi)$ | $v=\\lambda f=\\omega/k$ | $k=2\\pi/\\lambda$ | $\\omega=2\\pi f=2\\pi/T$</div><p><b>Wave eqns:</b> $\\frac{1}{v^2}\\frac{\\partial^2y}{\\partial t^2}=\\frac{\\partial^2y}{\\partial x^2}$ (1D) &nbsp; $\\nabla^2\\psi=\\frac{1}{v^2}\\frac{\\partial^2\\psi}{\\partial t^2}$ (3D)</p><p><b>String:</b> $v=\\sqrt{\\tau/\\mu}$, $\\mu=m/L$ | <b>Sound:</b> $v=\\sqrt{B/\\rho}$</p><p><b>Transverse vel:</b> $u=\\partial y/\\partial t$, max $u_m=A\\omega$ → $\\omega=u_m/A$ <span class="n">— use when given max transverse speed</span></p><p><b>Direction:</b> $kx-\\omega t$ → +x | $kx+\\omega t$ → −x <span class="w">⚠ sign of ω sets direction!</span></p><p><b>Power:</b> $P=\\frac12\\mu v\\omega^2 y_m^2\\propto\\sqrt\\tau\\, f^2$. 4×τ→2×P, ½f→¼P</p><p><b>τ from v:</b> $\\tau_2=\\tau_1(v_2/v_1)^2$ | <b>Hanging rope:</b> $v(y)=\\sqrt{gy}$, $t=2\\sqrt{L/g}$</p><p><b>Phase diff:</b> $\\Delta\\phi=\\frac{2\\pi}{\\lambda}\\Delta d$ | Constr: $\\Delta d=n\\lambda$ | Destr: $\\Delta d=(n-\\frac12)\\lambda$</p><p><b>Superposition amp:</b> $y_{net}=2y_m\\cos(\\phi/2)$</p><div class="tip">🎯 Given $y=A\\sin(kx-\\omega t)$ → extract: $\\lambda=2\\pi/k$, $f=\\omega/2\\pi$, $v=\\omega/k$, $T=1/f$</div>`},
    {title:"Standing Waves & Resonance", color:"#059669", content:`<div class="fb">$\\psi=[2A\\sin(\\omega t)]\\cos(kx)$ <span class="n">(standing wave)</span> | $\\psi=2A\\sin[\\frac{\\omega_1+\\omega_2}{2}t]\\cos[\\frac{\\omega_1-\\omega_2}{2}t]$ <span class="n">(beats)</span></div><p>Node spacing = $\\lambda/2$. Each traveling wave amp = ½ standing max.</p><p><b>Both fixed (or open):</b> $\\lambda_n=2L/n$, $f_n=nv/2L$, $n=1,2,3…$ | $\\Delta f=v/2L$</p><p><b>One end closed:</b> $\\lambda_n=4L/n$, $f_n=nv/4L$, <span class="w">n=1,3,5… ODD ONLY!</span> <span class="n">Closed=node, Open=antinode</span></p><svg width="160" height="36" viewBox="0 0 160 36" xmlns="http://www.w3.org/2000/svg"><text x="0" y="7" font-size="4.5" fill="#059669" font-weight="bold">Mode shapes (both ends fixed):</text><line x1="5" y1="14" x2="5" y2="32" stroke="#333" stroke-width="0.6"/><line x1="75" y1="14" x2="75" y2="32" stroke="#333" stroke-width="0.6"/><text x="3" y="13" font-size="3.3" fill="#333">wall</text><text x="69" y="13" font-size="3.3" fill="#333">wall</text><path d="M5,18 Q40,10 75,18" fill="none" stroke="#059669" stroke-width="0.6"/><text x="78" y="19" font-size="3.8" fill="#333">n=1: λ=2L (fundamental)</text><path d="M5,24 Q22,19 40,24 Q57,29 75,24" fill="none" stroke="#2563eb" stroke-width="0.6"/><text x="78" y="25" font-size="3.8" fill="#333">n=2: λ=L (1st overtone)</text><path d="M5,30 Q16,26 28,30 Q39,34 51,30 Q62,26 75,30" fill="none" stroke="#dc2626" stroke-width="0.6"/><text x="78" y="31" font-size="3.8" fill="#333">n=3: λ=⅔L (2nd overtone)</text></svg><p><b>String w/ mass:</b> $f_n=\\frac{n}{2L}\\sqrt{mg/\\mu}$ | <b>Two-section:</b> $n_2/n_1=(L_2\\sqrt{\\rho_2})/(L_1\\sqrt{\\rho_1})$</p><p><b>Path-diff interf:</b> Destr: $f_{min}=\\frac{(2n-1)v}{2\\Delta L}$ | Constr: $f_{max}=\\frac{nv}{\\Delta L}$</p><p><b>SWR:</b> $\\frac{A+B}{A-B}$, $R=(\\frac{\\text{SWR}-1}{\\text{SWR}+1})^2$ <span class="n">— SWR=1 means no reflection</span></p><div class="tip">🎯 Given standing wave → ID k,ω → find λ,f,v → locate nodes ($\\sin(kx)=0$) → count loops.</div>`},
    {title:"Fourier", color:"#059669", content:`<p>$F(x)=A_0+\\sum A_m\\cos(mkx)+\\sum B_m\\sin(mkx)$</p><p>$\\int_0^\\lambda\\sin(mkx)\\cos(nkx)dx=0$ | $\\int_0^\\lambda\\sin(mkx)\\sin(nkx)dx=\\frac\\lambda2\\delta_{mn}$ (same cos·cos)</p>`},
    {title:"Sound Waves", color:"#d97706", content:`<div class="fb">$\\beta=10\\log(I/I_0)$, $I_0=10^{-12}$ W/m² | $v_{snd}\\approx343$ m/s | $\\rho_{air}=1.21$ kg/m³</div><p><b>Intensity:</b> $I=\\frac12\\rho v(2\\pi f)^2s_m^2$ → $s_m=\\sqrt{\\frac{I}{2\\pi^2\\rho v f^2}}$ <span class="n">— use for displacement amp from intensity/dB</span></p><p><b>From dB:</b> $I=I_0\\cdot10^{\\beta/10}$ then plug in above</p><p><b>Point source:</b> $I=P/4\\pi r^2$ | +10dB=10×I | +3dB≈2×I | +20dB=100×I</p><p><b>Beats:</b> $f_{beat}=|f_1-f_2|$ <span class="n">— add mass→↓f. If beat↓ fork was higher.</span></p><p class="w">⚠ One-end-closed pipes: ODD harmonics only!</p>`},
    {title:"Doppler (Sound)", color:"#d97706", content:`<div class="fb">$f'=f\\left(\\frac{v_{snd}\\pm v_{obs}}{v_{snd}\\mp v_{src}}\\right)$</div><p><b>"Toward = Together = Top signs"</b> (↑f). Apart = bottom (↓f).</p><p><b>Numerator</b> = observer. <b>Denominator</b> = source.</p><p><b>Mach cone:</b> $\\sin\\theta=v_{snd}/v_{obj}$ <span class="n">— half-angle when source > sound speed</span></p><div class="tip">🎯 <b>Sonar:</b> Apply formula TWICE. Target is "observer" then "source". $f'_r=f\\frac{(v+u_1)(v+u_2)}{v(v-u_2)}$</div>`},

// ===== RENDER =====
function renderAll() {
  renderPage();
  renderSectionList();
  checkFit();
}

function renderPage() {
  const container = document.getElementById('columnsContainer');
  const fontSize = document.getElementById('fontSlider').value;
  const lineHeight = document.getElementById('lineSlider').value;
  const cols = document.getElementById('colSelect').value;
  const gap = document.getElementById('gapSlider').value;

  const page = document.getElementById('page');
  page.style.fontSize = fontSize + 'pt';
  page.style.lineHeight = lineHeight;
  container.style.columnCount = cols;
  container.style.columnGap = gap + 'pt';

  container.innerHTML = sections.map(s => `
    <div class="s" data-id="${s.id}" style="border-left:1.5pt solid ${s.color};">
      <div class="section-controls">
        <button onclick="moveSection(${s.id},-1)" title="Move up">▲</button>
        <button onclick="moveSection(${s.id},1)" title="Move down">▼</button>
        <button onclick="showImageModalFor(${s.id})" title="Add image">🖼</button>
        <button onclick="deleteSection(${s.id})" title="Delete" style="color:#fca5a5;">✕</button>
      </div>
      <h2 style="background:${s.color};font-size:${Math.max(parseFloat(fontSize)-0.2, 4)}pt;">${s.title}</h2>
      <div class="content" contenteditable="true" data-section-id="${s.id}">${s.content}</div>
    </div>
  `).join('');

  // Save edits back to state on blur
  container.querySelectorAll('.content[contenteditable]').forEach(el => {
    el.addEventListener('blur', function() {
      const id = parseInt(this.dataset.sectionId);
      const sec = sections.find(s => s.id === id);
      if (sec) sec.content = this.innerHTML;
    });
  });

  reRenderMath();
}

function renderSectionList() {
  const list = document.getElementById('sectionList');
  list.innerHTML = sections.map(s => `
    <div class="section-item" draggable="true" data-id="${s.id}"
         ondragstart="onDragStart(event)" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragend="onDragEnd(event)">
      <div class="dot" style="background:${s.color};"></div>
      <div class="name">${s.title}</div>
      <div class="btns">
        <button onclick="moveSection(${s.id},-1)">▲</button>
        <button onclick="moveSection(${s.id},1)">▼</button>
        <button onclick="deleteSection(${s.id})" style="color:#fca5a5;">✕</button>
      </div>
    </div>
  `).join('');
}

// ===== SECTION MANAGEMENT =====
function showAddSectionModal() {
  document.getElementById('newSectionTitle').value = '';
  document.getElementById('newSectionContent').value = '';
  document.getElementById('addSectionModal').style.display = 'flex';
}

function addSection() {
  const title = document.getElementById('newSectionTitle').value || 'New Section';
  const color = document.getElementById('newSectionColor').value;
  const content = document.getElementById('newSectionContent').value
    .replace(/\n/g, '<br>')
    .replace(/^(?!<)/, '<p>').replace(/(?<!>)$/, '</p>');
  sections.push({ id: sectionIdCounter++, title, color, content: content || '<p>Click to edit...</p>' });
  closeModal('addSectionModal');
  renderAll();
}

function deleteSection(id) {
  if (confirm('Delete this section?')) {
    sections = sections.filter(s => s.id !== id);
    renderAll();
  }
}

function moveSection(id, dir) {
  const idx = sections.findIndex(s => s.id === id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= sections.length) return;
  [sections[idx], sections[newIdx]] = [sections[newIdx], sections[idx]];
  renderAll();
}

// ===== DRAG & DROP =====
function onDragStart(e) {
  draggedItem = e.currentTarget;
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDrop(e) {
  e.preventDefault();
  const fromId = parseInt(draggedItem.dataset.id);
  const toId = parseInt(e.currentTarget.dataset.id);
  const fromIdx = sections.findIndex(s => s.id === fromId);
  const toIdx = sections.findIndex(s => s.id === toId);
  const [moved] = sections.splice(fromIdx, 1);
  sections.splice(toIdx, 0, moved);
  renderAll();
}
function onDragEnd(e) { e.currentTarget.style.opacity = '1'; draggedItem = null; }

// ===== IMAGE UPLOAD =====
function showAddImageModal() {
  populateImageSectionSelect();
  document.getElementById('addImageModal').style.display = 'flex';
}
function showImageModalFor(id) {
  populateImageSectionSelect();
  document.getElementById('imageTargetSection').value = id;
  document.getElementById('addImageModal').style.display = 'flex';
}
function populateImageSectionSelect() {
  const sel = document.getElementById('imageTargetSection');
  sel.innerHTML = sections.map(s => `<option value="${s.id}">${s.title}</option>`).join('');
}
document.getElementById('imageWidth').addEventListener('input', function() {
  document.getElementById('imageWidthVal').textContent = this.value + '%';
});

function addImageToSection() {
  const file = document.getElementById('imageFileInput').files[0];
  if (!file) { alert('Please select an image.'); return; }
  const secId = parseInt(document.getElementById('imageTargetSection').value);
  const maxW = document.getElementById('imageWidth').value;
  const reader = new FileReader();
  reader.onload = function(e) {
    const sec = sections.find(s => s.id === secId);
    if (sec) {
      sec.content += `<div class="section-img"><img src="${e.target.result}" style="max-width:${maxW}%;"><button class="remove-img" onclick="this.parentElement.remove()">×</button></div>`;
      renderAll();
    }
  };
  reader.readAsDataURL(file);
  closeModal('addImageModal');
}

// ===== AUTO-FIT =====
function autoFitPage() {
  const page = document.getElementById('page');
  const maxH = 11 * 96 - 0.24 * 96; // 11in minus margins in px

  // Step 1: Find the LARGEST font size that fits
  let lo = 4.0, hi = 8.5, bestFont = 4.0;
  page.style.lineHeight = '1.06';
  for (let i = 0; i < 25; i++) {
    const mid = (lo + hi) / 2;
    page.style.fontSize = mid + 'pt';
    reRenderMathSync();
    if (page.scrollHeight <= maxH) { bestFont = mid; lo = mid; }
    else { hi = mid; }
  }
  bestFont = Math.floor(bestFont * 10) / 10;
  page.style.fontSize = bestFont + 'pt';
  document.getElementById('fontSlider').value = bestFont;
  document.getElementById('fontVal').textContent = bestFont + 'pt';

  // Step 2: Grow line height to fill remaining vertical space
  lo = 1.0; hi = 1.5; let bestLine = 1.0;
  for (let i = 0; i < 20; i++) {
    const mid = (lo + hi) / 2;
    page.style.lineHeight = mid;
    if (page.scrollHeight <= maxH) { bestLine = mid; lo = mid; }
    else { hi = mid; }
  }
  bestLine = Math.floor(bestLine * 100) / 100;
  page.style.lineHeight = bestLine;
  document.getElementById('lineSlider').value = bestLine;
  document.getElementById('lineVal').textContent = bestLine;

  // Step 3: Try bumping font up one more notch with the new line height
  let tryFont = bestFont + 0.1;
  page.style.fontSize = tryFont + 'pt';
  reRenderMathSync();
  if (page.scrollHeight <= maxH) {
    bestFont = tryFont;
    document.getElementById('fontSlider').value = bestFont;
    document.getElementById('fontVal').textContent = bestFont + 'pt';
    // Re-optimize line height
    lo = bestLine; hi = 1.5; bestLine = lo;
    for (let i = 0; i < 15; i++) {
      const mid = (lo + hi) / 2;
      page.style.lineHeight = mid;
      if (page.scrollHeight <= maxH) { bestLine = mid; lo = mid; }
      else { hi = mid; }
    }
    bestLine = Math.floor(bestLine * 100) / 100;
    page.style.lineHeight = bestLine;
    document.getElementById('lineSlider').value = bestLine;
    document.getElementById('lineVal').textContent = bestLine;
  } else {
    page.style.fontSize = bestFont + 'pt';
  }

  reRenderMath();
  checkFit();
}

function checkFit() {
  const page = document.getElementById('page');
  const maxH = 11 * 96 - 0.24 * 96;
  const indicator = document.getElementById('fitIndicator');
  if (page.scrollHeight <= maxH + 2) {
    indicator.className = 'fit-indicator fit-ok';
    indicator.textContent = '✓ Fits on 1 page';
  } else {
    indicator.className = 'fit-indicator fit-over';
    indicator.textContent = '✕ Overflows! (' + Math.round(page.scrollHeight - maxH) + 'px over)';
  }
}

// ===== MATH RENDERING =====
function reRenderMath() {
  try {
    renderMathInElement(document.getElementById('page'), {
      delimiters: [{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],
      throwOnError: false
    });
  } catch(e) { console.warn('Math render error:', e); }
  setTimeout(checkFit, 100);
}
function reRenderMathSync() {
  try {
    renderMathInElement(document.getElementById('page'), {
      delimiters: [{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],
      throwOnError: false
    });
  } catch(e) {}
}

// ===== SLIDER LISTENERS =====
document.getElementById('fontSlider').addEventListener('input', function() {
  document.getElementById('fontVal').textContent = this.value + 'pt';
  document.getElementById('page').style.fontSize = this.value + 'pt';
  checkFit();
});
document.getElementById('lineSlider').addEventListener('input', function() {
  document.getElementById('lineVal').textContent = this.value;
  document.getElementById('page').style.lineHeight = this.value;
  checkFit();
});
document.getElementById('colSelect').addEventListener('change', function() {
  document.getElementById('columnsContainer').style.columnCount = this.value;
  checkFit();
});
document.getElementById('gapSlider').addEventListener('input', function() {
  document.getElementById('gapVal').textContent = this.value + 'pt';
  document.getElementById('columnsContainer').style.columnGap = this.value + 'pt';
  checkFit();
});

// ===== IMPORT / EXPORT =====
function exportJSON() {
  // Sync content from DOM
  document.querySelectorAll('.content[contenteditable]').forEach(el => {
    const id = parseInt(el.dataset.sectionId);
    const sec = sections.find(s => s.id === id);
    if (sec) sec.content = el.innerHTML;
  });

  const data = {
    header: document.getElementById('pageHeader').innerHTML,
    fontSize: document.getElementById('fontSlider').value,
    lineHeight: document.getElementById('lineSlider').value,
    columns: document.getElementById('colSelect').value,
    gap: document.getElementById('gapSlider').value,
    sections: sections
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cheatsheet_project.json';
  a.click();
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.header) document.getElementById('pageHeader').innerHTML = data.header;
      if (data.fontSize) { document.getElementById('fontSlider').value = data.fontSize; document.getElementById('fontVal').textContent = data.fontSize+'pt'; }
      if (data.lineHeight) { document.getElementById('lineSlider').value = data.lineHeight; document.getElementById('lineVal').textContent = data.lineHeight; }
      if (data.columns) document.getElementById('colSelect').value = data.columns;
      if (data.gap) { document.getElementById('gapSlider').value = data.gap; document.getElementById('gapVal').textContent = data.gap+'pt'; }
      if (data.sections) {
        sections = data.sections;
        sectionIdCounter = Math.max(...sections.map(s=>s.id)) + 1;
      }
      renderAll();
    } catch(err) { alert('Error loading file: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// ===== INIT =====
initSections();
</script>
